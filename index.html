<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure8 MVP</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f7fa;
  padding: 15px;
  min-height: 100vh;
}
.header {
  background: #2d5a8c;
  color: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
}
h1 { font-size: 1.5rem; }
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.tab {
  padding: 15px;
  border: none;
  background: white;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
}
.tab.active {
  background: #2d5a8c;
  color: white;
}
.content { display: none; }
.content.active { display: block; }
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.card-clickable {
  cursor: pointer;
  transition: transform 0.2s;
}
.card-clickable:active {
  transform: scale(0.98);
}
.btn {
  padding: 15px;
  background: #2d5a8c;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
  font-weight: 600;
}
.btn:active {
  background: #1e3d5f;
}
.btn-secondary {
  background: #95a5a6;
}
.btn-danger {
  background: #e74c3c;
}
.btn-success {
  background: #27ae60;
}
input, select, textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid #e0e6ed;
  border-radius: 8px;
  font-size: 15px;
  margin: 8px 0 15px 0;
  font-family: inherit;
}
textarea {
  min-height: 80px;
  resize: vertical;
}
label {
  display: block;
  font-weight: 600;
  margin-top: 10px;
  font-size: 14px;
  color: #2c3e50;
}
.camera-area {
  border: 3px dashed #e0e6ed;
  border-radius: 10px;
  padding: 50px 20px;
  text-align: center;
  background: #f8f9fa;
  cursor: pointer;
  margin-bottom: 20px;
}
.camera-area:active {
  background: #e8ecf1;
}
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
}
.modal.active { display: flex; align-items: center; justify-content: center; }
.modal-content {
  background: white;
  padding: 30px;
  border-radius: 15px;
  max-width: 90%;
  max-height: 80%;
  overflow-y: auto;
}
.modal-close {
  background: none;
  border: none;
  font-size: 30px;
  cursor: pointer;
  float: right;
}
.camera-frame {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 2000;
}
.camera-frame.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#cameraVideo {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
}
.camera-controls {
  position: fixed;
  bottom: 30px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.capture-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: white;
  border: 5px solid #f39c12;
  cursor: pointer;
}
.close-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  border: 2px solid white;
  color: white;
  font-size: 24px;
  cursor: pointer;
}
canvas { display: none; }
.preview-img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}
.loading {
  text-align: center;
  padding: 20px;
  color: #2d5a8c;
}
</style>
</head>
<body>

<div class="header">
  <h1>🔷 Azure8 MVP</h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('add')">➕ 登録</button>
  <button class="tab" onclick="showTab('list')">📋 一覧</button>
</div>

<div id="add" class="content active">
  <div class="card">
    <h3 style="margin-bottom: 15px;">📸 名刺撮影</h3>
    <div class="camera-area" onclick="openCamera()">
      <div style="font-size: 40px; margin-bottom: 10px;">📷</div>
      <div style="font-weight: 600; color: #2d5a8c;">タップして撮影</div>
    </div>
    
    <div id="preview-section" style="display:none;">
      <img id="preview" class="preview-img">
      <button class="btn btn-success" onclick="startOCR()">🤖 AI読み取り開始</button>
      <button class="btn btn-secondary" onclick="skipOCR()">⏭️ スキップ（手動入力）</button>
      <button class="btn btn-secondary" onclick="resetCamera()">📸 撮り直し</button>
    </div>
    
    <div id="loading" class="loading" style="display:none;">
      <div style="font-size: 35px;">🤖</div>
      <div>AI が読み取り中...</div>
    </div>
    
    <div id="form" style="display:none;">
      <h3 style="margin: 20px 0 15px;">✏️ 情報入力</h3>
      
      <label>👤 名前 *</label>
      <input type="text" id="name" required>
      
      <label>🏢 会社名</label>
      <input type="text" id="company">
      
      <label>📞 電話番号</label>
      <input type="tel" id="phone">
      
      <label>✉️ メール</label>
      <input type="email" id="email">
      
      <label>📂 カテゴリー</label>
      <select id="category">
        <option value="TV">TV</option>
        <option value="新聞">新聞</option>
        <option value="WEB">WEB</option>
        <option value="雑誌">雑誌</option>
        <option value="ラジオ">ラジオ</option>
        <option value="Youtube">Youtube</option>
        <option value="専門誌">専門誌</option>
        <option value="その他">その他</option>
      </select>
      
      <label>📰 媒体名</label>
      <input type="text" id="media">
      
      <label>📝 メモ</label>
      <textarea id="memo"></textarea>
      
      <button class="btn" onclick="saveCard()">💾 保存する</button>
      <button class="btn btn-secondary" onclick="resetForm()">🔄 リセット</button>
    </div>
  </div>
</div>

<div id="list" class="content">
  <div id="cards"></div>
</div>

<div id="cameraFrame" class="camera-frame">
  <video id="cameraVideo" autoplay playsinline></video>
  <div class="camera-controls">
    <button class="close-btn" onclick="closeCamera()">×</button>
    <button class="capture-btn" onclick="capturePhoto()"></button>
  </div>
</div>
<canvas id="canvas"></canvas>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// ========== 設定 ==========
const API_KEY = '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';
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycby8cFeMunD2z2cBi8tUklR7vXA9BRlT-NfO1WMdvT_eXCEFQQWGA4in0HxZmMIqoYaDxg/exec';

let data = JSON.parse(localStorage.getItem('azure8') || '[]');
let currentImage = '';
let stream = null;
let editingIndex = -1;

// ========== タブ切替 ==========
function showTab(tab) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  if (tab === 'list') displayList();
}

// ========== カメラ ==========
async function openCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment' } 
    });
    document.getElementById('cameraVideo').srcObject = stream;
    document.getElementById('cameraFrame').classList.add('active');
  } catch (e) {
    alert('カメラアクセスエラー: ' + e.message);
  }
}

function closeCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById('cameraFrame').classList.remove('active');
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  currentImage = canvas.toDataURL('image/jpeg', 0.7);
  
  closeCamera();
  
  document.getElementById('preview').src = currentImage;
  document.getElementById('preview-section').style.display = 'block';
}

function resetCamera() {
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('form').style.display = 'none';
  currentImage = '';
}

// ========== OCR ==========
async function startOCR() {
  if (!API_KEY || API_KEY.includes('YOUR_API')) {
    alert('APIキーが設定されていません');
    showForm();
    return;
  }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('preview-section').style.display = 'none';
  
  try {
    const base64 = currentImage.split(',')[1];
    
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: 'この名刺から情報を抽出してJSON形式で返してください。\n{"name": "氏名", "company": "会社名", "phone": "電話番号", "email": "メールアドレス"}\n見つからない項目は空文字にしてください。JSONのみ返してください。' }
          ]
        }]
      })
    });
    
    if (!res.ok) throw new Error('API Error: ' + res.status);
    
    const result = await res.json();
    const text = result.content[0].text;
    const match = text.match(/\{[\s\S]*?\}/);
    
    if (match) {
      const info = JSON.parse(match[0]);
      document.getElementById('name').value = info.name || '';
      document.getElementById('company').value = info.company || '';
      document.getElementById('phone').value = info.phone || '';
      document.getElementById('email').value = info.email || '';
    }
    
    showForm();
  } catch (e) {
    console.error('OCRエラー:', e);
    alert('OCRエラー: ' + e.message + '\n\n手動で入力してください');
    showForm();
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function skipOCR() {
  showForm();
}

function showForm() {
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('form').style.display = 'block';
}

function resetForm() {
  document.getElementById('name').value = '';
  document.getElementById('company').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('email').value = '';
  document.getElementById('media').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('form').style.display = 'none';
  currentImage = '';
}

// ========== 保存 ==========
async function saveCard() {
  const name = document.getElementById('name').value.trim();
  
  if (!name) {
    alert('名前を入力してください');
    return;
  }
  
  const item = {
    name,
    company: document.getElementById('company').value,
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    category: document.getElementById('category').value,
    media: document.getElementById('media').value,
    memo: document.getElementById('memo').value,
    image: await compressImage(currentImage, 0.2),
    date: new Date().toISOString().split('T')[0],
    timestamp: Date.now()
  };
  
  if (editingIndex >= 0) {
    data[editingIndex] = item;
    editingIndex = -1;
  } else {
    data.push(item);
  }
  
  try {
    localStorage.setItem('azure8', JSON.stringify(data));
  } catch(e) {
    item.image = '';
    localStorage.setItem('azure8', JSON.stringify(data));
  }
  
  let sheetsOk = false;
  try {
    await saveToSheets(item);
    sheetsOk = true;
  } catch(e) {
    console.error('Sheets error:', e);
  }
  
  alert(sheetsOk ? '✅ 保存完了！\n\nローカル ✓\nスプレッドシート ✓' : '✅ ローカル保存完了\n⚠️ シート保存失敗');
  
  resetForm();
  resetCamera();
  showTab('list');
}

async function saveToSheets(item) {
  const fd = new URLSearchParams();
  fd.append('data', JSON.stringify(item));
  
  const res = await fetch(SHEETS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: fd
  });
  
  if (!res.ok && res.type !== 'opaque') {
    throw new Error('保存失敗');
  }
}

function compressImage(base64, quality) {
  return new Promise((resolve) => {
    if (!base64) { resolve(''); return; }
    
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > 600) { h = h * 600 / w; w = 600; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

// ========== 一覧表示 ==========
function displayList() {
  const cards = document.getElementById('cards');
  
  if (data.length === 0) {
    cards.innerHTML = '<div class="card"><p style="text-align:center; color:#999;">データがありません</p></div>';
    return;
  }
  
  const sorted = [...data].sort((a,b) => a.name.localeCompare(b.name, 'ja'));
  
  cards.innerHTML = sorted.map((item, idx) => {
    const realIdx = data.indexOf(item);
    return `
      <div class="card card-clickable" onclick="openDetail(${realIdx})">
        <h3 style="margin-bottom: 8px;">${item.name}</h3>
        <p style="color: #666; font-size: 14px;">${item.company || ''}</p>
        ${item.category ? `<p style="color: #2d5a8c; font-size: 13px; margin-top: 5px;">📂 ${item.category}</p>` : ''}
      </div>
    `;
  }).join('');
}

function openDetail(i) {
  const item = data[i];
  editingIndex = i;
  
  document.getElementById('detailContent').innerHTML = `
    ${item.image ? `<img src="${item.image}" style="width:100%; border-radius:10px; margin-bottom:15px;">` : ''}
    
    <h3 style="margin-bottom: 15px;">${item.name}</h3>
    
    <label>🏢 会社名</label>
    <input type="text" id="editCompany" value="${item.company || ''}">
    
    <label>📞 電話番号</label>
    <input type="tel" id="editPhone" value="${item.phone || ''}">
    
    <label>✉️ メール</label>
    <input type="email" id="editEmail" value="${item.email || ''}">
    
    <label>📂 カテゴリー</label>
    <select id="editCategory">
      <option ${item.category === 'TV' ? 'selected' : ''}>TV</option>
      <option ${item.category === '新聞' ? 'selected' : ''}>新聞</option>
      <option ${item.category === 'WEB' ? 'selected' : ''}>WEB</option>
      <option ${item.category === '雑誌' ? 'selected' : ''}>雑誌</option>
      <option ${item.category === 'ラジオ' ? 'selected' : ''}>ラジオ</option>
      <option ${item.category === 'Youtube' ? 'selected' : ''}>Youtube</option>
      <option ${item.category === '専門誌' ? 'selected' : ''}>専門誌</option>
      <option ${item.category === 'その他' ? 'selected' : ''}>その他</option>
    </select>
    
    <label>📰 媒体名</label>
    <input type="text" id="editMedia" value="${item.media || ''}">
    
    <label>📝 メモ</label>
    <textarea id="editMemo">${item.memo || ''}</textarea>
    
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      ${item.phone ? `<a href="tel:${item.phone}" class="btn" style="flex:1; text-decoration:none; text-align:center;">📞 電話</a>` : ''}
      ${item.email ? `<a href="mailto:${item.email}" class="btn btn-success" style="flex:1; text-decoration:none; text-align:center;">✉️ メール</a>` : ''}
    </div>
    
    <button class="btn" onclick="updateCard()">💾 更新</button>
    <button class="btn btn-danger" onclick="deleteCard(${i})">🗑️ 削除</button>
  `;
  
  document.getElementById('detailModal').classList.add('active');
}

function updateCard() {
  const item = data[editingIndex];
  item.company = document.getElementById('editCompany').value;
  item.phone = document.getElementById('editPhone').value;
  item.email = document.getElementById('editEmail').value;
  item.category = document.getElementById('editCategory').value;
  item.media = document.getElementById('editMedia').value;
  item.memo = document.getElementById('editMemo').value;
  
  localStorage.setItem('azure8', JSON.stringify(data));
  alert('✅ 更新しました');
  closeModal();
  displayList();
}

function deleteCard(i) {
  if (confirm('削除しますか？')) {
    data.splice(i, 1);
    localStorage.setItem('azure8', JSON.stringify(data));
    alert('✅ 削除しました');
    closeModal();
    displayList();
  }
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
  editingIndex = -1;
}

// ========== 初期化 ==========
displayList();
</script>
</body>
</html>
